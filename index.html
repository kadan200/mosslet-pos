<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="mosslet POS">
  <title>mosslet POS</title>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alegreya:ital,wght@0,400;0,500;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    /* ── LP design tokens (exact) ─────────────────────────── */
    :root {
      --fd: 'Alegreya', Georgia, serif;
      --fb: 'DM Sans', system-ui, sans-serif;
      --fm: 'DM Mono', 'Courier New', monospace;

      --bg:           #f7f5f0;
      --bg-alt:       #eeeae2;
      --card:         #ffffff;
      --ink:          #19170f;
      --body:         #4b4740;
      --muted:        #98928a;
      --border:       #e2ddd5;
      --sage:         #3a6144;
      --sage-bg:      #eaf0e8;
      --sage-border:  #c4d9c0;
      --amber-bg:     #fef8e8;
      --amber-border: #f4e099;
      --amber-text:   #7a5710;
      --danger:       #9a3428;
      --danger-bg:    #fdf0ee;
      --danger-border:#e8c0bb;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--body); overflow: hidden; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
    #root { height: 100%; font-family: var(--fb); }

    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input::placeholder { color: var(--muted); opacity: 0.65; }
    .num { font-variant-numeric: tabular-nums; }
    button { -webkit-tap-highlight-color: transparent; touch-action: manipulation; font-family: var(--fb); }
    .scroll { overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .scroll::-webkit-scrollbar { width: 3px; }
    .scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* cards */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1.5rem;
      box-shadow: 0 1px 12px rgba(0,0,0,0.05);
    }
    .card-alt {
      background: var(--bg-alt);
      border: 1px solid var(--border);
      border-radius: 1.5rem;
    }
    .card-dashed {
      background: var(--bg);
      border: 1.5px dashed var(--border);
      border-radius: 1.5rem;
    }

    /* tag pill — exact LP style */
    .tag {
      display: inline-flex;
      align-items: center;
      padding: 3px 12px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: var(--sage-bg);
      color: var(--sage);
      border: 1px solid var(--sage-border);
      font-family: var(--fb);
    }

    /* nav blur */
    .nav-blur {
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    /* tab */
    .tab-btn {
      background: none; border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      padding: 13px 16px 11px;
      font-size: 11px;
      font-family: var(--fm);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      min-height: 48px;
    }
    .tab-btn.active { color: var(--sage); border-bottom-color: var(--sage); }

    /* ghost btn */
    .gb {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--body);
      padding: 8px 18px;
      font-size: 12px;
      font-family: var(--fb);
      cursor: pointer;
      letter-spacing: 0.02em;
      min-height: 40px;
      transition: opacity 0.15s;
    }
    .gb:hover { opacity: 0.72; }

    /* input */
    .inp {
      background: var(--bg-alt);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      color: var(--ink);
      font-family: var(--fb);
      outline: none;
      font-variant-numeric: tabular-nums;
      width: 100%;
      transition: border-color 0.15s;
    }
    .inp:focus { border-color: var(--sage); }

    /* product card */
    .prod-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1rem;
      overflow: hidden;
      isolation: isolate;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .prod-card.sel {
      border-color: var(--sage);
      box-shadow: 0 2px 14px rgba(58,97,68,0.13);
    }

    /* thumbnail */
    .thumb-wrap {
      background: var(--bg-alt);
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; position: relative;
    }
    .thumb-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.38s cubic-bezier(0.33,1,0.68,1); }
    .thumb-wrap:hover img { transform: scale(1.04); }
    .thumb-overlay {
      position: absolute; inset: 0;
      background: rgba(25,23,15,0.45);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.2s;
    }
    .thumb-wrap:hover .thumb-overlay { opacity: 1; }
    .thumb-upload { display: none; }

    /* bar chart */
    .bar-track { background: var(--bg-alt); border-radius: 3px; overflow: hidden; height: 6px; flex: 1; }
    .bar-fill   { height: 100%; background: var(--sage); border-radius: 3px; transition: width 0.65s cubic-bezier(0.16,1,0.3,1); }

    /* banners */
    .banner-sage   { background: var(--sage-bg);  border: 1px solid var(--sage-border);   border-radius: 1rem; padding: 1rem 1.25rem; display: flex; gap: 0.625rem; color: var(--sage); }
    .banner-danger { background: var(--danger-bg); border: 1px solid var(--danger-border); border-radius: 1rem; padding: 1rem 1.25rem; display: flex; gap: 0.625rem; color: var(--danger); }

    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .fade-up { animation: fadeUp 0.22s ease both; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useRef} = React;

const C = {
  bg:'#f7f5f0', bgAlt:'#eeeae2', card:'#ffffff',
  ink:'#19170f', body:'#4b4740', muted:'#98928a', border:'#e2ddd5',
  sage:'#3a6144', sageBg:'#eaf0e8', sageBorder:'#c4d9c0',
  danger:'#9a3428', dangerBg:'#fdf0ee', dangerBorder:'#e8c0bb',
};

const PRODS0 = [
  {id:1, name:'ポストカード 1枚',           price:100,  thumb:null, variant:'', category:'ポストカード'},
  {id:2, name:'ポストカード 12枚フルセット',  price:1000, thumb:null, variant:'', category:'セット'},
];
const QUICK = [500,1000,2000,5000,10000];
const TABS  = ['レジ','商品管理','売上履歴'];

const LS = {
  get:(k,fb)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
};
const yen = n=>`¥${Number(n).toLocaleString('ja-JP')}`;

/* icons */
const IcoImg = ({size=20}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round">
    <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
    <polyline points="21 15 16 10 5 21"/>
  </svg>
);
const IcoUp = ({size=18}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
    <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
  </svg>
);
const IcoInfo = ({size=14}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0,marginTop:1}}>
    <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
  </svg>
);

/* Cart accordion component */
const CartAccordion = ({cItems, total, C}) => {
  const [open, setOpen] = React.useState(false);
  return (
    <div className="card fade-up" style={{flexShrink:0}}>
      <button onClick={()=>setOpen(o=>!o)} style={{
        width:'100%', background:'none', border:'none', cursor:'pointer',
        padding:'1rem 1.25rem', display:'flex', alignItems:'center', justifyContent:'space-between',
        borderBottom: open&&cItems.length>0 ? `1px solid ${C.border}` : 'none',
        borderRadius:'1.5rem',
      }}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontFamily:'var(--fm)',fontSize:10,letterSpacing:'0.16em',textTransform:'uppercase',color:C.muted}}>Cart</span>
          {cItems.length>0&&(
            <span style={{background:C.sage,color:'#fff',borderRadius:999,fontFamily:'var(--fm)',fontSize:10,padding:'1px 8px',letterSpacing:'0.06em'}}>
              {cItems.reduce((s,i)=>s+i.qty,0)}点
            </span>
          )}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          {cItems.length>0&&(
            <span className="num" style={{fontFamily:'var(--fd)',fontWeight:400,fontSize:'clamp(1.5rem,3.5vw,2rem)',color:C.ink,lineHeight:1}}>{yen(total)}</span>
          )}
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={C.muted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
            style={{transform:open?'rotate(180deg)':'rotate(0deg)',transition:'transform 0.22s ease',flexShrink:0}}>
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
      </button>
      {open&&(
        <div style={{padding:'0.875rem 1.25rem 1.25rem'}}>
          {cItems.length===0?(
            <div style={{textAlign:'center',padding:'0.75rem 0'}}>
              <div style={{fontFamily:'var(--fm)',fontSize:11,color:C.muted,letterSpacing:'0.08em',marginBottom:2}}>商品を選択してください</div>
              <div style={{fontFamily:'var(--fm)',fontSize:10,color:C.border,letterSpacing:'0.06em'}}>← ＋ボタンで数量を追加</div>
            </div>
          ):(
            <div style={{maxHeight:260,overflowY:'auto'}}>
              {cItems.map(i=>(
                <div key={i.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:`1px solid ${C.border}`}}>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    {i.thumb&&<img src={i.thumb} alt="" style={{width:26,height:26,borderRadius:'0.375rem',objectFit:'cover',flexShrink:0,border:`1px solid ${C.border}`}}/>}
                    <div>
                      <span style={{fontSize:13,color:C.body}}>{i.name}</span>
                      {i.variant&&<span style={{fontFamily:'var(--fm)',fontSize:10,color:C.muted,marginLeft:5}}>{i.variant}</span>}
                      <span style={{fontFamily:'var(--fm)',fontSize:11,color:C.muted,marginLeft:5}}>× {i.qty}</span>
                    </div>
                  </div>
                  <span className="num" style={{fontFamily:'var(--fm)',fontSize:14,color:C.ink,flexShrink:0}}>{yen(i.price*i.qty)}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
};

/* primitives */
const Lbl = ({c, style={}}) => (
  <div style={{fontFamily:'var(--fm)',fontSize:10,letterSpacing:'0.16em',textTransform:'uppercase',color:C.muted,marginBottom:8,...style}}>{c}</div>
);

/* thumb upload */
const ThumbInput = ({value, onChange, compact=false}) => {
  const ref = useRef();
  const [dragging, setDragging] = useState(false);

  const readFile = f => {
    if(!f||!f.type.startsWith('image/')) return;
    const r = new FileReader();
    r.onload = ev => onChange(ev.target.result);
    r.readAsDataURL(f);
  };
  const onFile  = e => readFile(e.target.files[0]);
  const onDrop  = e => { e.preventDefault(); setDragging(false); readFile(e.dataTransfer.files[0]); };
  const onDragOver  = e => { e.preventDefault(); setDragging(true); };
  const onDragLeave = e => { e.preventDefault(); setDragging(false); };

  return (
    <div className="thumb-wrap"
      onClick={()=>ref.current.click()}
      onDrop={onDrop}
      onDragOver={onDragOver}
      onDragLeave={onDragLeave}
      style={{
        width: compact?80:'100%',
        aspectRatio: compact?'1':'3/2',
        borderRadius: compact?'0.75rem':'1rem 1rem 0 0',
        flexShrink: 0,
        border: dragging ? `2px dashed ${C.sage}` : compact ? `1px solid ${C.border}` : 'none',
        background: dragging ? C.sageBg : undefined,
        transition: 'border-color 0.15s, background 0.15s',
      }}
    >
      <input ref={ref} type="file" accept="image/*" className="thumb-upload" onChange={onFile} />
      {value
        ? <img src={value} alt="thumb" />
        : <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6,color:dragging?C.sage:C.muted,fontFamily:'var(--fm)',fontSize:10,letterSpacing:'0.08em',opacity:dragging?1:0.65,transition:'color 0.15s'}}>
            <IcoImg size={compact?16:22} />
            {!compact && <span>{dragging ? 'ドロップして追加' : '画像を追加 / ドラッグ&ドロップ'}</span>}
          </div>
      }
      {!dragging && <div className="thumb-overlay"><IcoUp size={compact?14:18}/></div>}
    </div>
  );
};

/* popularity chart */
const PopChart = ({sales, prods}) => {
  const counts = {};
  sales.forEach(s=>s.items.forEach(i=>{counts[i.id]=(counts[i.id]||0)+i.qty;}));
  const ranked = Object.entries(counts)
    .map(([id,qty])=>{
      const p=prods.find(x=>x.id===Number(id));
      return {id:Number(id),name:p?.name||'削除済み',thumb:p?.thumb||null,variant:p?.variant||'',qty};
    }).sort((a,b)=>b.qty-a.qty);
  const mx = ranked[0]?.qty||1;
  if(!ranked.length) return null;
  return (
    <div className="card" style={{padding:'1.25rem 1.5rem',marginBottom:16}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
        <span className="tag">Popularity</span>
        <span style={{fontFamily:'var(--fm)',fontSize:10,color:C.muted,letterSpacing:'0.06em'}}>絵柄ランキング</span>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        {ranked.map((item,i)=>(
          <div key={item.id} style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{fontFamily:'var(--fm)',fontSize:11,color:i===0?'#8C6C30':C.muted,width:20,textAlign:'right',flexShrink:0,fontWeight:i===0?600:400}}>#{i+1}</div>
            <div style={{width:42,height:42,borderRadius:'0.625rem',overflow:'hidden',background:C.bgAlt,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',border:`1px solid ${C.border}`,color:C.muted}}>
              {item.thumb?<img src={item.thumb} alt={item.name} style={{width:'100%',height:'100%',objectFit:'cover'}}/>:<IcoImg size={15}/>}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontFamily:'var(--fb)',fontSize:13,fontWeight:500,color:C.ink,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',marginBottom:5}}>
                {item.name}{item.variant?` — ${item.variant}`:''}
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <div className="bar-track"><div className="bar-fill" style={{width:`${(item.qty/mx)*100}%`}}/></div>
                <span className="num" style={{fontFamily:'var(--fm)',fontSize:12,color:C.body,flexShrink:0}}>{item.qty}点</span>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

/* del confirm */
const DelConfirm = ({label,onOk,onNo}) => (
  <div style={{display:'flex',justifyContent:'flex-end',alignItems:'center',gap:8,paddingTop:12,borderTop:`1px solid ${C.border}`,flexWrap:'wrap'}}>
    <span style={{fontFamily:'var(--fm)',fontSize:11,color:C.danger}}>{label}</span>
    <button onClick={onOk} style={{background:C.danger,border:'none',borderRadius:999,color:'#fff',padding:'8px 20px',fontSize:12,cursor:'pointer',minHeight:40}}>削除</button>
    <button onClick={onNo} className="gb">キャンセル</button>
  </div>
);

/* ══ App ══ */
function App() {
  const [tab,    setTab]    = useState('レジ');
  const [prods,  setProds]  = useState(()=>LS.get('pos_prods3',PRODS0));
  const [sales,  setSales]  = useState(()=>LS.get('pos_sales', []));
  const [nid,    setNid]    = useState(()=>LS.get('pos_nid',   10));
  const [cart,   setCart]   = useState({});
  const [rcvIn,  setRcvIn]  = useState('');
  const [done,   setDone]   = useState(null);
  const [ed,     setEd]     = useState(null);
  const [nname,  setNname]  = useState('');
  const [nprice, setNprice] = useState('');
  const [nthumb, setNthumb] = useState(null);
  const [nvar,   setNvar]   = useState('');
  const [ncat,   setNcat]   = useState('');
  const [catFilter, setCatFilter] = useState('すべて');
  const [edSale, setEdSale] = useState(null);
  const [delS,   setDelS]   = useState(null);
  const [clrOk,  setClrOk]  = useState(false);

  useEffect(()=>{LS.set('pos_prods3',prods);},[prods]);
  useEffect(()=>{LS.set('pos_sales', sales);},[sales]);
  useEffect(()=>{LS.set('pos_nid',   nid);  },[nid]);

  const setQty = (id,q)=>setCart(p=>({...p,[id]:Math.max(0,q)}));
  const cItems = prods.filter(p=>(cart[p.id]||0)>0).map(p=>({...p,qty:cart[p.id]}));
  const total  = cItems.reduce((s,i)=>s+i.price*i.qty,0);
  const rcv    = parseInt(rcvIn)||0;
  const change = rcv>=total?rcv-total:null;
  const canPay = cItems.length>0&&change!==null;

  const checkout = ()=>{
    if(!canPay) return;
    const r={id:Date.now(),time:new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}),items:cItems,total,received:rcv,change:rcv-total};
    setSales(p=>[r,...p]); setDone(r); setCart({}); setRcvIn('');
  };
  const clearCart = ()=>{setCart({}); setRcvIn(''); setDone(null);};

  const addProd = ()=>{
    const p=parseInt(nprice);
    if(!nname.trim()||isNaN(p)||p<=0) return;
    setProds(prev=>[...prev,{id:nid,name:nname.trim(),price:p,thumb:nthumb,variant:nvar.trim(),category:ncat.trim()}]);
    setNid(n=>n+1); setNname(''); setNprice(''); setNthumb(null); setNvar(''); setNcat('');
  };
  const rmProd = id=>{setProds(p=>p.filter(x=>x.id!==id));setCart(p=>{const c={...p};delete c[id];return c;});};
  const saveEd = id=>{setProds(p=>p.map(x=>x.id===id?{...x,name:ed.name,price:parseInt(ed.price)||x.price,thumb:ed.thumb,variant:ed.variant,category:ed.category||''}:x));setEd(null);};

  const startEdSale = s=>setEdSale({id:s.id,items:s.items.map(i=>({...i,eQty:String(i.qty),ePrice:String(i.price)}))});
  const saveEdSale  = ()=>{
    setSales(prev=>prev.map(s=>{
      if(s.id!==edSale.id) return s;
      const ni=edSale.items.map(i=>({...i,qty:Math.max(0,parseInt(i.eQty)||0),price:Math.max(0,parseInt(i.ePrice)||0)})).filter(i=>i.qty>0);
      return {...s,items:ni,total:ni.reduce((sum,i)=>sum+i.price*i.qty,0)};
    }));
    setEdSale(null);
  };
  const delSale = id=>{setSales(p=>p.filter(s=>s.id!==id));setDelS(null);if(edSale?.id===id)setEdSale(null);};

  const totSales = sales.reduce((s,r)=>s+r.total,0);
  const totQty   = sales.reduce((s,r)=>s+r.items.reduce((a,i)=>a+i.qty,0),0);

  const downloadCSV = ()=>{
    const rows=[['時刻','商品名','バリアント','数量','単価','小計','合計','受取','おつり']];
    sales.forEach(s=>s.items.forEach((item,idx)=>{
      rows.push([idx===0?s.time:'',item.name,item.variant||'',item.qty,item.price,item.price*item.qty,idx===0?s.total:'',idx===0?s.received:'',idx===0?s.change:'']);
    }));
    const bom='\uFEFF';
    const csv=bom+rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\r\n');
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    const date=new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\//g,'');
    a.href=url;a.download=`mosslet-sales-${date}.csv`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  };

  const p_inp = {padding:'12px 14px',fontSize:15};

  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column',background:C.bg,color:C.body}}>

      {/* header */}
      <header className="nav-blur" style={{
        background:'rgba(247,245,240,0.9)',borderBottom:`1px solid ${C.border}`,
        flexShrink:0,paddingLeft:'env(safe-area-inset-left)',paddingRight:'env(safe-area-inset-right)',
      }}>
        <div style={{maxWidth:1200,margin:'0 auto',padding:'0 clamp(1rem,3vw,2rem)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'baseline',gap:10,padding:'10px 0'}}>
            <span style={{fontFamily:'var(--fd)',fontWeight:400,fontSize:22,letterSpacing:'0.01em',color:C.ink}}>mosslet</span>
            <span className="tag" style={{fontSize:9,padding:'2px 10px',letterSpacing:'0.14em'}}>POS</span>
          </div>
          <nav style={{display:'flex'}}>
            {TABS.map(t=>(
              <button key={t} onClick={()=>{setTab(t);setDone(null);}} className={`tab-btn${tab===t?' active':''}`}>{t}</button>
            ))}
          </nav>
        </div>
      </header>

      {/* body */}
      <div style={{flex:1,overflow:'hidden',maxWidth:1200,margin:'0 auto',width:'100%',
        paddingLeft:'calc(clamp(1rem,3vw,2rem) + env(safe-area-inset-left))',
        paddingRight:'calc(clamp(1rem,3vw,2rem) + env(safe-area-inset-right))'}}>

        {/* ══ レジ ══ */}
        {tab==='レジ'&&(done?(
          <div style={{height:'100%',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <div style={{textAlign:'center',width:'100%',maxWidth:520}} className="fade-up">
              <div style={{width:68,height:68,borderRadius:'50%',border:`1.5px solid ${C.sage}`,boxShadow:`0 0 0 14px ${C.sageBg}`,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 28px',color:C.sage,fontSize:26}}>✓</div>
              <div className="num" style={{fontFamily:'var(--fd)',fontWeight:400,fontSize:'clamp(3rem,10vw,5rem)',lineHeight:1,color:C.ink,marginBottom:8}}>{yen(done.total)}</div>
              <div className="num" style={{fontFamily:'var(--fm)',fontSize:13,color:C.muted,letterSpacing:'0.12em',marginBottom:32}}>おつり {yen(done.change)}</div>
              <div className="card" style={{textAlign:'left',marginBottom:24,padding:'1.25rem 1.5rem'}}>
                {done.items.map(i=>(
                  <div key={i.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:`1px solid ${C.border}`}}>
                    <div style={{display:'flex',alignItems:'center',gap:10}}>
                      {i.thumb&&<img src={i.thumb} alt="" style={{width:34,height:34,borderRadius:'0.5rem',objectFit:'cover',border:`1px solid ${C.border}`}}/>}
                      <span style={{fontSize:15,color:C.body}}>{i.name}{i.variant?` — ${i.variant}`:''} × {i.qty}</span>
                    </div>
                    <span className="num" style={{fontFamily:'var(--fm)',fontSize:15,color:C.ink}}>{yen(i.price*i.qty)}</span>
                  </div>
                ))}
              </div>
              <button onClick={clearCart} style={{width:'100%',background:C.sage,border:'none',borderRadius:999,color:'#fff',padding:'16px',fontSize:15,fontWeight:500,cursor:'pointer',minHeight:52}}>次の会計へ</button>
            </div>
          </div>
        ):(
          <div style={{height:'100%',display:'grid',gridTemplateColumns:'1fr 1fr',gap:24,paddingTop:20,paddingBottom:20}}>

            {/* 左：商品グリッド */}
            <div className="scroll fade-up" style={{paddingRight:4}}>
              {/* カテゴリーフィルター */}
              {(()=>{
                const cats = ['すべて', ...Array.from(new Set(prods.map(p=>p.category||'').filter(Boolean)))];
                return cats.length>1 ? (
                  <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:12}}>
                    {cats.map(cat=>(
                      <button key={cat} onClick={()=>setCatFilter(cat)} style={{
                        background: catFilter===cat ? C.sage : C.card,
                        border: `1px solid ${catFilter===cat ? C.sage : C.border}`,
                        borderRadius:999,
                        color: catFilter===cat ? '#fff' : C.body,
                        padding:'6px 14px',
                        fontSize:12,
                        fontFamily:'var(--fb)',
                        cursor:'pointer',
                        transition:'background 0.15s,border-color 0.15s,color 0.15s',
                        minHeight:34,
                        letterSpacing:'0.02em',
                      }}>{cat}</button>
                    ))}
                  </div>
                ) : null;
              })()}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
                {/* catFilterで絞り込み */}
                {prods.filter(p=>catFilter==='すべて'||(p.category||'')=== catFilter).map(p=>{
                  const q=cart[p.id]||0;
                  return (
                    <div key={p.id} className={`prod-card${q>0?' sel':''}`}>
                      {p.thumb?(
                        <div style={{width:'100%',aspectRatio:'3/2',position:'relative',overflow:'hidden',borderRadius:'1rem 1rem 0 0'}}>
                          <img src={p.thumb} alt={p.name} style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover',display:'block',transition:'transform 0.38s ease'}}
                            onMouseEnter={e=>e.currentTarget.style.transform='scale(1.04)'}
                            onMouseLeave={e=>e.currentTarget.style.transform='scale(1)'}
                          />
                        </div>
                      ):(
                        <div style={{width:'100%',aspectRatio:'3/2',background:C.bgAlt,display:'flex',alignItems:'center',justifyContent:'center',color:C.border,borderBottom:`1px solid ${C.border}`,borderRadius:'1rem 1rem 0 0'}}>
                          <IcoImg size={22}/>
                        </div>
                      )}
                      <div style={{padding:'12px 14px'}}>
                        <div style={{fontWeight:500,fontSize:14,color:C.ink,lineHeight:1.3,marginBottom:2}}>{p.name}</div>
                        {p.variant&&<div style={{fontFamily:'var(--fm)',fontSize:10,color:C.muted,letterSpacing:'0.06em',marginBottom:4}}>{p.variant}</div>}
                        <div className="num" style={{fontFamily:'var(--fm)',fontSize:15,color:C.sage,fontWeight:500,marginBottom:12}}>{yen(p.price)}</div>
                        <div style={{display:'flex',alignItems:'center',gap:8}}>
                          <button onClick={()=>setQty(p.id,q-1)} style={{background:C.bgAlt,border:`1px solid ${C.border}`,borderRadius:'0.5rem',width:36,height:36,fontSize:18,color:C.muted,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>−</button>
                          <span className="num" style={{fontFamily:'var(--fm)',fontSize:18,minWidth:22,textAlign:'center',color:C.ink,fontWeight:q>0?600:400}}>{q}</span>
                          <button onClick={()=>setQty(p.id,q+1)} style={{background:q>0?C.sage:C.bgAlt,border:`1px solid ${q>0?C.sage:C.border}`,borderRadius:'0.5rem',width:36,height:36,fontSize:18,color:q>0?'#fff':C.muted,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',transition:'background 0.15s,border-color 0.15s'}}>＋</button>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* 右：Cart + Received + 決済 */}
            <div style={{display:'flex',flexDirection:'column',gap:16,minHeight:0}}>

              {/* Cart — アコーディオン */}
              <CartAccordion cItems={cItems} total={total} C={C} />

              {/* Received */}
              <div className="card fade-up" style={{flex:1,padding:'1.25rem 1.5rem',overflowY:'auto'}}>
                <Lbl c="Received" />
                <input type="number" value={rcvIn} onChange={e=>setRcvIn(e.target.value)} placeholder="受取金額を入力"
                  className="inp" style={{...p_inp,fontSize:22,marginBottom:12}}/>
                <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:total>0?10:0}}>
                  {QUICK.map(a=>(
                    <button key={a} onClick={()=>setRcvIn(String(a))} className="num"
                      style={{background:C.bgAlt,border:`1px solid ${C.border}`,borderRadius:'0.75rem',color:C.body,padding:'11px 0',fontFamily:'var(--fm)',fontSize:13,cursor:'pointer',minHeight:46}}>
                      {yen(a)}
                    </button>
                  ))}
                </div>
                {total>0&&(
                  <button onClick={()=>setRcvIn(String(total))}
                    style={{width:'100%',background:'transparent',border:`1px solid ${C.sageBorder}`,borderRadius:'0.75rem',color:C.sage,padding:'11px',fontFamily:'var(--fm)',fontSize:13,letterSpacing:'0.06em',cursor:'pointer',minHeight:46,marginBottom:10}}>
                    ちょうど {yen(total)}
                  </button>
                )}
                {rcv>0&&total>0&&(
                  <div className={`num ${change!==null?'banner-sage':'banner-danger'}`}
                    style={{fontFamily:'var(--fm)',fontSize:15,marginTop:4}}>
                    {change!==null
                      ?<span>おつり <strong style={{fontFamily:'var(--fd)',fontSize:28,fontWeight:400,letterSpacing:'-0.01em'}}>{yen(change)}</strong></span>
                      :<span>不足 <strong style={{fontFamily:'var(--fd)',fontSize:26,fontWeight:400}}>{yen(total-rcv)}</strong></span>
                    }
                  </div>
                )}
              </div>

              <div style={{display:'flex',gap:10,flexShrink:0}}>
                <button onClick={clearCart} style={{flex:1,background:'transparent',border:`1px solid ${C.border}`,borderRadius:999,color:C.muted,padding:'16px',fontSize:14,cursor:'pointer',minHeight:56}}>クリア</button>
                <button onClick={checkout} disabled={!canPay} style={{flex:2,background:canPay?C.sage:C.border,border:'none',borderRadius:999,color:canPay?'#fff':C.muted,padding:'16px',fontSize:16,fontWeight:500,cursor:canPay?'pointer':'not-allowed',transition:'background 0.2s',minHeight:56}}>会計確定</button>
              </div>
            </div>
          </div>
        ))}

        {/* ══ 商品管理 ══ */}
        {tab==='商品管理'&&(
          <div className="scroll fade-up" style={{height:'100%',paddingTop:20,paddingBottom:20}}>

            {/* エクスポート・インポート */}
            <div style={{display:'flex',gap:8,marginBottom:20,alignItems:'center',flexWrap:'wrap'}}>
              <button onClick={()=>{
                const json = JSON.stringify({version:1, prods, nid}, null, 2);
                const blob = new Blob([json],{type:'application/json'});
                const url  = URL.createObjectURL(blob);
                const a    = document.createElement('a');
                const date = new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\//g,'');
                a.href=url; a.download=`mosslet-products-${date}.json`;
                document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
              }} className="gb" style={{color:C.sage,borderColor:C.sageBorder}}>
                ↓ 商品データをエクスポート
              </button>
              <label style={{
                display:'inline-flex',alignItems:'center',
                background:'transparent',border:`1px solid ${C.border}`,borderRadius:999,
                color:C.body,padding:'8px 18px',fontSize:12,cursor:'pointer',minHeight:40,
                fontFamily:'var(--fb)',letterSpacing:'0.02em',
              }}>
                ↑ インポート
                <input type="file" accept="application/json,.json" style={{display:'none'}} onChange={e=>{
                  const f=e.target.files[0]; if(!f) return;
                  const r=new FileReader();
                  r.onload=ev=>{
                    try{
                      const d=JSON.parse(ev.target.result);
                      if(d.prods&&Array.isArray(d.prods)){
                        if(window.confirm(`${d.prods.length}件の商品データを読み込みます。現在のデータは上書きされます。よろしいですか？`)){
                          setProds(d.prods);
                          if(d.nid) setNid(d.nid);
                        }
                      } else { alert('商品データが見つかりませんでした。'); }
                    } catch{ alert('JSONの読み込みに失敗しました。'); }
                  };
                  r.readAsText(f);
                  e.target.value='';
                }}/>
              </label>
              <span style={{fontFamily:'var(--fm)',fontSize:10,color:C.muted,letterSpacing:'0.06em'}}>JSONで保存・復元できます</span>
            </div>

            <Lbl c="Product List" />
            {prods.map(p=>(
              <div key={p.id} className="card" style={{marginBottom:10,overflow:'hidden'}}>
                {ed?.id===p.id?(
                  <div style={{padding:'1.25rem 1.5rem'}}>
                    <div style={{display:'flex',gap:14,marginBottom:14}}>
                      <div style={{flexShrink:0}}>
                        <Lbl c="画像" style={{marginBottom:6}}/>
                        <ThumbInput value={ed.thumb} onChange={v=>setEd(x=>({...x,thumb:v}))} compact />
                      </div>
                      <div style={{flex:1,display:'flex',flexDirection:'column',gap:8}}>
                        <input value={ed.name} onChange={e=>setEd(v=>({...v,name:e.target.value}))} placeholder="商品名" className="inp" style={p_inp}/>
                        <input value={ed.variant||''} onChange={e=>setEd(v=>({...v,variant:e.target.value}))} placeholder="バリアント名（例：春の野原、夕暮れ）" className="inp" style={{...p_inp,fontSize:13}}/>
                        <input value={ed.category||''} onChange={e=>setEd(v=>({...v,category:e.target.value}))} placeholder="カテゴリー（例：ポストカード、セット、グッズ）" className="inp" style={{...p_inp,fontSize:13}}/>
                        <input type="number" value={ed.price} onChange={e=>setEd(v=>({...v,price:e.target.value}))} placeholder="価格" className="inp" style={{...p_inp,width:140,textAlign:'right'}}/>
                      </div>
                    </div>
                    <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
                      <button onClick={()=>setEd(null)} className="gb">キャンセル</button>
                      <button onClick={()=>saveEd(p.id)} style={{background:C.sage,border:'none',borderRadius:999,color:'#fff',padding:'8px 24px',fontSize:13,cursor:'pointer',minHeight:40}}>保存</button>
                    </div>
                  </div>
                ):(
                  <div style={{display:'flex',alignItems:'center',gap:14,padding:'1rem 1.25rem'}}>
                    <div style={{width:64,height:64,borderRadius:'0.75rem',overflow:'hidden',background:C.bgAlt,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',border:`1px solid ${C.border}`,color:C.border}}>
                      {p.thumb?<img src={p.thumb} alt={p.name} style={{width:'100%',height:'100%',objectFit:'cover'}}/>:<IcoImg size={18}/>}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:500,fontSize:16,color:C.ink}}>{p.name}</div>
                      <div style={{display:'flex',alignItems:'center',gap:6,marginTop:2,flexWrap:'wrap'}}>
                        {p.category&&<span style={{fontFamily:'var(--fm)',fontSize:9,letterSpacing:'0.1em',background:C.sageBg,color:C.sage,border:`1px solid ${C.sageBorder}`,borderRadius:999,padding:'1px 8px'}}>{p.category}</span>}
                        {p.variant&&<span style={{fontFamily:'var(--fm)',fontSize:10,color:C.muted,letterSpacing:'0.06em'}}>{p.variant}</span>}
                      </div>
                      <div className="num" style={{fontFamily:'var(--fm)',fontSize:15,color:C.sage,fontWeight:500,marginTop:3}}>{yen(p.price)}</div>
                    </div>
                    <div style={{display:'flex',gap:8,flexShrink:0}}>
                      <button onClick={()=>setEd({id:p.id,name:p.name,price:String(p.price),thumb:p.thumb||null,variant:p.variant||'',category:p.category||''})} className="gb">編集</button>
                      <button onClick={()=>rmProd(p.id)} className="gb" style={{color:C.danger,borderColor:`${C.danger}55`}}>削除</button>
                    </div>
                  </div>
                )}
              </div>
            ))}

            <div className="card-dashed" style={{marginTop:24,overflow:'hidden'}}>
              <div style={{padding:'1.25rem 1.5rem 0'}}>
                <Lbl c="Add Product" />
                <Lbl c="商品画像（任意）" style={{marginBottom:8}}/>
                <ThumbInput value={nthumb} onChange={setNthumb}/>
              </div>
              <div style={{padding:'1rem 1.5rem 0',display:'flex',gap:10,flexWrap:'wrap'}}>
                <input value={nname} onChange={e=>setNname(e.target.value)} placeholder="商品名" className="inp" style={{...p_inp,flex:1,minWidth:160}}/>
                <input type="number" value={nprice} onChange={e=>setNprice(e.target.value)} placeholder="価格" className="inp" style={{...p_inp,width:130,textAlign:'right'}}/>
              </div>
              <div style={{padding:'0.625rem 1.5rem 0'}}>
                <input value={nvar} onChange={e=>setNvar(e.target.value)} placeholder="バリアント名（例：春の野原・ツバメ）— 同一価格で絵柄違いの場合" className="inp" style={{...p_inp,fontSize:13}}/>
              </div>
              <div style={{padding:'0.5rem 1.5rem 0'}}>
                <input value={ncat} onChange={e=>setNcat(e.target.value)} placeholder="カテゴリー（例：ポストカード、セット、グッズ）— 任意テキスト" className="inp" style={{...p_inp,fontSize:13}}/>
              </div>
              <div style={{padding:'1rem 1.5rem 1.25rem'}}>
                <button onClick={addProd} style={{width:'100%',background:C.sage,border:'none',borderRadius:999,color:'#fff',padding:'13px',fontSize:13,fontWeight:500,letterSpacing:'0.06em',cursor:'pointer',minHeight:48}}>＋ 追加</button>
              </div>
            </div>
          </div>
        )}

        {/* ══ 売上履歴 ══ */}
        {tab==='売上履歴'&&(
          <div className="scroll fade-up" style={{height:'100%',paddingTop:20,paddingBottom:20}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
              <div className="card" style={{padding:'1.25rem 1.5rem'}}>
                <Lbl c="Total Sales"/>
                <div className="num" style={{fontFamily:'var(--fd)',fontWeight:400,fontSize:'clamp(2rem,5vw,2.75rem)',color:C.ink,lineHeight:1}}>{yen(totSales)}</div>
              </div>
              <div className="card" style={{padding:'1.25rem 1.5rem'}}>
                <Lbl c="Items Sold"/>
                <div className="num" style={{fontFamily:'var(--fd)',fontWeight:400,fontSize:'clamp(2rem,5vw,2.75rem)',color:C.ink,lineHeight:1}}>{totQty}</div>
                <div className="num" style={{fontFamily:'var(--fm)',fontSize:11,color:C.muted,marginTop:4}}>{sales.length} 件</div>
              </div>
            </div>

            {sales.length>0&&<PopChart sales={sales} prods={prods}/>}

            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexWrap:'wrap',gap:8}}>
              <Lbl c="History" style={{marginBottom:0}}/>
              <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                {sales.length>0&&<button onClick={downloadCSV} className="gb" style={{color:C.sage,borderColor:C.sageBorder}}>CSVダウンロード</button>}
                {sales.length>0&&!clrOk&&<button onClick={()=>setClrOk(true)} className="gb" style={{color:C.danger,borderColor:`${C.danger}44`}}>全消去</button>}
                {clrOk&&<>
                  <span style={{fontFamily:'var(--fm)',fontSize:11,color:C.danger}}>すべて削除しますか？</span>
                  <button onClick={()=>{setSales([]);setClrOk(false);}} style={{background:C.danger,border:'none',borderRadius:999,color:'#fff',padding:'8px 20px',fontSize:12,cursor:'pointer',minHeight:40}}>削除</button>
                  <button onClick={()=>setClrOk(false)} className="gb">キャンセル</button>
                </>}
              </div>
            </div>

            {sales.length===0?(
              <div style={{textAlign:'center',padding:'60px 0'}}>
                <div style={{fontFamily:'var(--fm)',fontSize:11,color:C.muted,letterSpacing:'0.1em',marginBottom:16}}>まだ売上がありません</div>
                <button onClick={()=>setTab('レジ')} className="gb" style={{color:C.sage,borderColor:C.sageBorder}}>レジへ</button>
              </div>
            ):sales.map(s=>{
              const isEd=edSale?.id===s.id,isDel=delS===s.id;
              const edTot=isEd?edSale.items.reduce((sum,i)=>sum+(parseInt(i.ePrice)||0)*(parseInt(i.eQty)||0),0):s.total;
              return (
                <div key={s.id} className="card" style={{marginBottom:10,padding:'1.25rem 1.5rem'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:isEd?14:8}}>
                    <span style={{fontFamily:'var(--fm)',fontSize:11,color:C.muted,letterSpacing:'0.08em'}}>{s.time}</span>
                    <div style={{display:'flex',alignItems:'baseline',gap:10}}>
                      <span className="num" style={{fontFamily:'var(--fd)',fontWeight:400,fontSize:28,color:C.ink}}>{yen(isEd?edTot:s.total)}</span>
                      {!isEd&&!isDel&&(
                        <div style={{display:'flex',gap:6}}>
                          <button onClick={()=>{setDelS(null);startEdSale(s);}} className="gb" style={{padding:'6px 14px',fontSize:11,minHeight:34}}>編集</button>
                          <button onClick={()=>{setEdSale(null);setDelS(s.id);}} className="gb" style={{padding:'6px 14px',fontSize:11,minHeight:34,color:C.danger,borderColor:`${C.danger}44`}}>削除</button>
                        </div>
                      )}
                    </div>
                  </div>
                  {!isEd&&!isDel&&s.items.map(i=>(
                    <div key={i.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'4px 0'}}>
                      <div style={{display:'flex',alignItems:'center',gap:8}}>
                        {i.thumb&&<img src={i.thumb} alt="" style={{width:26,height:26,borderRadius:'0.375rem',objectFit:'cover',border:`1px solid ${C.border}`}}/>}
                        <span style={{fontSize:14,color:C.body}}>{i.name}{i.variant?` — ${i.variant}`:''} × {i.qty}</span>
                      </div>
                      <span className="num" style={{fontFamily:'var(--fm)',fontSize:15,color:C.muted}}>{yen(i.price*i.qty)}</span>
                    </div>
                  ))}
                  {isDel&&<DelConfirm label="この取引を削除しますか？" onOk={()=>delSale(s.id)} onNo={()=>setDelS(null)}/>}
                  {isEd&&(<>
                    {edSale.items.map((item,idx)=>(
                      <div key={item.id} style={{display:'grid',gridTemplateColumns:'1fr 88px 96px',gap:10,alignItems:'center',padding:'8px 0',borderBottom:`1px solid ${C.border}`}}>
                        <span style={{fontSize:14,color:C.body}}>{item.name}{item.variant?` — ${item.variant}`:''}</span>
                        <div>
                          <Lbl c="数量" style={{marginBottom:4,fontSize:9}}/>
                          <input type="number" value={item.eQty}
                            onChange={e=>setEdSale(prev=>({...prev,items:prev.items.map((x,i)=>i===idx?{...x,eQty:e.target.value}:x)}))}
                            className="inp" style={{padding:'8px',fontSize:14,textAlign:'right'}}/>
                        </div>
                        <div>
                          <Lbl c="単価" style={{marginBottom:4,fontSize:9}}/>
                          <input type="number" value={item.ePrice}
                            onChange={e=>setEdSale(prev=>({...prev,items:prev.items.map((x,i)=>i===idx?{...x,ePrice:e.target.value}:x)}))}
                            className="inp" style={{padding:'8px',fontSize:14,textAlign:'right'}}/>
                        </div>
                      </div>
                    ))}
                    <div style={{display:'flex',gap:8,marginTop:12,justifyContent:'flex-end'}}>
                      <button onClick={()=>setEdSale(null)} className="gb">キャンセル</button>
                      <button onClick={saveEdSale} style={{background:C.sage,border:'none',borderRadius:999,color:'#fff',padding:'8px 24px',fontSize:13,cursor:'pointer',minHeight:40}}>保存</button>
                    </div>
                  </>)}
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
